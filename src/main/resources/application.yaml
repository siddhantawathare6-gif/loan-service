server:
  port: 8090
spring:
  application:
    name: loan
  profiles:
    active: prod
  config:
    import: "optional:configserver:http://localhost:8071/"
  datasource:
#    url: jdbc:mysql://localhost:3307/loandb (just to test eureka, i changed port number, using docker it should run on different port i.e 3308)
    url: jdbc:mysql://localhost:3306/loandb
    username: root
    password: system@123
  jpa:
    show-sql: true
  sql:
    init:
      mode: ALWAYS

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    shutdown:
      enabled: true
  info:
    env:
      enabled: true


eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8070/eureka/

info:
  app:
    name: loan
    description: "EasyBank loan application"
    version: 1.0.0

